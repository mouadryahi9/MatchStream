services:
  postgres:
    image: postgres:16-alpine
    container_name: matchstream-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: matchstream
      POSTGRES_PASSWORD: ${DB_PASSWORD:-matchstream_secret}
      POSTGRES_DB: matchstream
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/data/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matchstream"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: matchstream-cache
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-matchstream_redis}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: matchstream-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: matchstream
      DB_PASSWORD: ${DB_PASSWORD:-matchstream_secret}
      DB_NAME: matchstream
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-matchstream_redis}
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_this_refresh_secret}
      STREAMS_DIR: /data/streams
      MAX_CONCURRENT_STREAMS: 5
    volumes:
      - streams_data:/data/streams
      - ./backend/logs:/app/logs
    ports:
      - "4000:4000"

  web-app:
    build:
      context: ./web-app
      dockerfile: Dockerfile
    container_name: matchstream-web
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: /api
      NEXT_PUBLIC_WS_URL: /ws
    ports:
      - "3000:80"

  admin-dashboard:
    build:
      context: ./admin-dashboard
      dockerfile: Dockerfile
    container_name: matchstream-admin
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: /api
      NEXT_PUBLIC_WS_URL: /ws
    ports:
      - "3001:3001"

  nginx:
    image: nginx:alpine
    container_name: matchstream-proxy
    restart: unless-stopped
    depends_on:
      - backend
      - web-app
      - admin-dashboard
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - streams_data:/streams:ro
    ports:
      - "80:80"
      - "443:443"

volumes:
  postgres_data:
  redis_data:
  streams_data:
