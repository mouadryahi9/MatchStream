# IPTV HLS Nginx Configuration
# Place in /etc/nginx/sites-available/iptv
# ln -s /etc/nginx/sites-available/iptv /etc/nginx/sites-enabled/

upstream backend {
    server 127.0.0.1:4000;
    keepalive 64;
}

server {
    listen 80;
    server_name your-domain.com;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # CORS headers for HLS
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;
    add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Range" always;

    # Gzip
    gzip on;
    gzip_types application/vnd.apple.mpegurl video/mp2t text/plain application/json;
    gzip_min_length 1000;
    gzip_vary on;

    # API proxy to Node.js backend
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }

    # HLS cache delivery via Nginx (NOT Express)
    location /hls_cache/ {
        alias /path/to/matchstream/backend/hls_cache/;

        # Performance: sendfile + tcp_nopush
        sendfile on;
        sendfile_max_chunk 1m;
        tcp_nopush on;

        # No buffering for streaming
        output_buffers 1 512k;
        aio on;
        directio 512;

        # Cache control
        expires epoch;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Access-Control-Allow-Origin "*" always;

        # Range requests for segment seeking
        add_header Accept-Ranges bytes;

        # MIME types
        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t ts;
            text/plain m3u8;
        }

        # Deny directory listing
        autoindex off;

        # Log HLS access separately
        access_log /var/log/nginx/hls_access.log;
    }

    # WebSocket support
    location /ws {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Health check
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

