<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Start Stream</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0a0a0f; color: #e0e0e0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { background: #14141f; border: 1px solid #2a2a3a; border-radius: 12px; padding: 32px; width: 100%; max-width: 520px; }
  h1 { color: #6366f1; font-size: 24px; margin-bottom: 8px; }
  .sub { color: #6b7280; font-size: 14px; margin-bottom: 24px; }
  label { display: block; font-size: 12px; color: #9ca3af; margin-bottom: 4px; margin-top: 16px; }
  input, select { width: 100%; padding: 10px 12px; background: #1a1a2e; border: 1px solid #2a2a3a; border-radius: 8px; color: #e0e0e0; font-size: 14px; }
  input:focus, select:focus { outline: none; border-color: #6366f1; }
  button { width: 100%; margin-top: 24px; padding: 12px; background: #6366f1; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
  button:hover { background: #4f46e5; }
  .error { background: #7f1d1d; border: 1px solid #991b1b; color: #fca5a5; padding: 12px; border-radius: 8px; margin-bottom: 16px; display: none; }
  .success { background: #14532d; border: 1px solid #166534; color: #86efac; padding: 12px; border-radius: 8px; margin-bottom: 16px; display: none; }
  a { color: #6366f1; }
  .nav { text-align: center; font-size: 13px; color: #6b7280; margin-top: 20px; }
  .nav a { margin: 0 8px; }
</style>
</head>
<body>
<div class="card">
  <h1>MatchStream</h1>
  <p class="sub">Start a new live stream</p>
  <div class="error" id="error"></div>
  <div class="success" id="success"></div>
  <form id="streamForm">
    <label>Match ID *</label>
    <input type="text" id="matchId" placeholder="From Matches page in admin" required>

    <label>Stream Title</label>
    <input type="text" id="title" value="Stream 1" required>

    <label>Source URL *</label>
    <input type="url" id="sourceUrl" placeholder="https://example.com/stream.m3u8" required>

    <label>Source Type</label>
    <select id="sourceType">
      <option value="m3u8">M3U8</option>
      <option value="url">URL</option>
      <option value="rtmp">RTMP</option>
      <option value="iframe">Iframe</option>
    </select>

    <label>Admin Token *</label>
    <input type="password" id="token" placeholder="Paste your JWT token here" required>

    <button type="submit">Start Stream</button>
  </form>
  <div class="nav">
    <a href="http://localhost/admin/" target="_blank">Admin Dashboard</a>
    <a href="http://localhost/" target="_blank">Web App</a>
  </div>
</div>
<script>
document.getElementById("streamForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const err = document.getElementById("error");
  const suc = document.getElementById("success");
  err.style.display = "none";
  suc.style.display = "none";
  try {
    const res = await fetch("http://localhost/api/streams", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + document.getElementById("token").value,
      },
      body: JSON.stringify({
        match_id: document.getElementById("matchId").value,
        title: document.getElementById("title").value,
        source_url: document.getElementById("sourceUrl").value,
        source_type: document.getElementById("sourceType").value,
      }),
    });
    const data = await res.json();
    if (res.ok) {
      const id = data.id || data.stream?.id || "OK";
      suc.textContent = "Stream started successfully! ID: " + id;
      suc.style.display = "block";
    } else {
      err.textContent = data.error || "Failed to start stream";
      err.style.display = "block";
    }
  } catch (ex) {
    err.textContent = ex.message;
    err.style.display = "block";
  }
});
</script>
</body>
</html>
